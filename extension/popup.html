<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 250px;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: white;
            text-align: center;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: #1a1a1a;
            border: 1px solid #ffd700;
            color: #ffd700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        h1 { font-size: 16px; margin: 0 0 10px 0; }
        p { font-size: 12px; color: #888; margin-bottom: 20px; }
        .btn {
            background: #ffd700;
            color: black;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="status-badge">AI Monitoring Active</div>
    <h1>Phishing Detector</h1>
    <p>Protecting your Gmail inbox with deep-learning threat analysis.</p>
    <button class="btn" id="docsBtn">API Docs</button>
    <script src="popup.js"></script>
</body>
</html>
